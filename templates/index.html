<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSR Calculator | Telesales Portal</title>
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Vanilla CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-logo">
            <i class="fa-solid fa-calculator"></i>
            <h1>DSR Calculator</h1>
        </div>
        <button id="resetBtn" class="btn-reset">
            <i class="fa-solid fa-rotate-right"></i>
            <span>Reset Form</span>
        </button>
    </header>

    <!-- Main Workspace Container -->
    <div class="app-container">
        <main class="layout-grid">
            
            <!-- Left Column: Input Form Panel -->
            <section class="card">
                
                <!-- Section 1: Income & DSR -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fa-solid fa-wallet"></i>
                        Section 1: Income & DSR
                    </h2>
                    
                    <div class="form-grid-3">
                        <!-- Nett Income Field -->
                        <div class="input-container">
                            <label for="nettIncome" class="field-label">Nett Income (Gaji Bersih)</label>
                            <div class="input-group">
                                <span class="input-addon">RM</span>
                                <input type="number" id="nettIncome" placeholder="0.00" class="input-field" step="any" min="0" required>
                            </div>
                        </div>

                        <!-- Maximum DSR % Field -->
                        <div class="input-container">
                            <label for="maxDsr" class="field-label">Maximum DSR (%)</label>
                            <div class="input-group">
                                <input type="number" id="maxDsr" value="60" placeholder="60" class="input-field" step="any" min="0" required>
                                <span class="input-addon">%</span>
                            </div>
                        </div>

                        <!-- Maximum Eligible Commitment (Read-Only) -->
                        <div class="input-container">
                            <label for="maxCommitment" class="field-label">Max Eligible Commitment</label>
                            <div class="input-group readonly-group">
                                <span class="input-addon">RM</span>
                                <input type="text" id="maxCommitment" value="0.00" class="input-field" readonly>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Existing Commitments -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fa-solid fa-hand-holding-dollar"></i>
                        Section 2: Existing Commitments
                    </h2>
                    
                    <div class="commitments-list" id="commitmentsList">
                        <!-- Dynamic commitment rows will be inserted here by JS -->
                    </div>

                    <button type="button" id="addCommitmentBtn" class="btn-add">
                        <i class="fa-solid fa-plus"></i>
                        Add Commitment
                    </button>
                </div>

            </section>

            <!-- Right Column: Results Panel -->
            <section class="results-panel">
                
                <!-- Total Commitment Result Card -->
                <div class="sub-result-card">
                    <div class="sub-result-info">
                        <h4>Total Commitment</h4>
                        <p id="totalCommitmentDisplay">RM 0.00</p>
                    </div>
                    <div class="sub-result-icon">
                        <i class="fa-solid fa-receipt"></i>
                    </div>
                </div>

                <!-- DSR Balance Highlight Card (Spotlight) -->
                <div id="dsrBalanceCard" class="dsr-balance-card eligible">
                    <h3 class="balance-title">DSR Balance</h3>
                    <div class="balance-val" id="dsrBalanceVal">RM 0.00</div>
                    <div class="balance-status" id="dsrBalanceStatus">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>Customer Eligible</span>
                    </div>
                </div>

            </section>

        </main>
    </div>

    <!-- Client-side Logic Script -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
